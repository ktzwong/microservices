openapi: 3.0.0
info:
  title: Analyzer API
  version: '1.0.0'
  description: Reads events from the Kafka queue and returns stats

paths:
  /league/match_history:
    get:
      summary: Get a match history event by index
      operationId: app.get_match_history
      parameters:
        - name: index
          in: query
          required: true
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Successfully returned a match history event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchHistoryEvent'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /league/champion_winrate:
    get:
      summary: Get a champion winrate event by index
      operationId: app.get_champion_winrate
      parameters:
        - name: index
          in: query
          required: true
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Successfully returned a champion winrate event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChampionWinrateEvent'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /stats:
    get:
      summary: Get event counts from the Kafka queue
      operationId: app.get_reading_stats
      responses:
        '200':
          description: Successfully returned stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'

components:
  schemas:
    MatchHistoryEvent:
      type: object
      required:
        - user_id
        - reporting_timestamp
        - match_id
        - champion_id
        - kills
        - deaths
        - win
        - trace_id
      properties:
        user_id:
          type: string
          example: "d290f1ee-6c54-4b01-90e6-d701748f0851"
        reporting_timestamp:
          type: string
          example: "2026-01-13T04:12:33Z"
        match_id:
          type: string
          example: "NA1_1234567890"
        champion_id:
          type: integer
          example: 172
        kills:
          type: integer
          example: 10
        deaths:
          type: integer
          example: 2
        win:
          type: boolean
          example: true
        trace_id:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    ChampionWinrateEvent:
      type: object
      required:
        - source_id
        - reporting_timestamp
        - champion_id
        - games_played
        - win_rate
        - patch_version
        - trace_id
      properties:
        source_id:
          type: string
          example: "opgg-service"
        reporting_timestamp:
          type: string
          example: "2026-01-13T04:30:00Z"
        champion_id:
          type: integer
          example: 1
        games_played:
          type: integer
          example: 15000
        win_rate:
          type: number
          example: 0.523
        patch_version:
          type: string
          example: "16.1"
        trace_id:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    Stats:
      type: object
      required:
        - num_match_history
        - num_champion_winrate
      properties:
        num_match_history:
          type: integer
          example: 100
        num_champion_winrate:
          type: integer
          example: 100
