services:

  zookeeper:
    image: wurstmeister/zookeeper
    expose:
      - "2181"
    volumes:
      - zookeeper-data:/data

  kafka:
    image: wurstmeister/kafka
    expose:
      - "9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CREATE_TOPICS: "events:1:1"
    volumes:
      - kafka-data:/kafka
    depends_on:
      - zookeeper

  mysql:
    image: mysql:latest
    environment:
      MYSQL_DATABASE: events
      MYSQL_USER: acit3855
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql

  receiver:
    build:
      context: receiver
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      - kafka

  storage:
    build:
      context: storage
      dockerfile: Dockerfile
    expose:
      - "8090"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      - mysql
      - kafka

  processing:
    build:
      context: processing
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
    depends_on:
      - storage

  analyzer:
    build:
      context: analyzer
      dockerfile: Dockerfile
    ports:
      - "8025:8025"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      - kafka

volumes:
  mysql_data:
  kafka-data:
  zookeeper-data:
