services:
  zookeeper:
    image: wurstmeister/zookeeper
    expose:
      - "2181"
    volumes:
      - ./data/zookeeper:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: wurstmeister/kafka
    expose:
      - "9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CREATE_TOPICS: "events:1:1"
    volumes:
      - ./data/kafka:/kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--zookeeper", "zookeeper:2181"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s


  mysql:
    image: mysql:latest
    environment:
      MYSQL_DATABASE: events
      MYSQL_USER: acit3855
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "acit3855", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  receiver:
    build:
      context: receiver
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      replicas: 3


  storage:
    build:
      context: storage
      dockerfile: Dockerfile
    expose:
      - "8090"
    environment:
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  
  processing:
    build:
      context: processing
      dockerfile: Dockerfile
    expose:
      - "8100"
    environment:
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
    depends_on:
      storage:
        condition: service_started


  analyzer:
    build:
      context: analyzer
      dockerfile: Dockerfile
    expose:
      - "8025"
    environment:
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
    depends_on:
      kafka:
        condition: service_healthy

  dashboard-ui:
    build:
      context: dashboard-ui
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - receiver
      - storage
      - processing
      - analyzer

volumes:
  mysql_data:
